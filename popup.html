<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>HighlightVault</title>
</head>
<body>
  <div class="hv-popup">
    <!-- Header -->
    <div class="hv-header">
      <div class="hv-title-row">
        <div class="hv-title">
          <img src="icons/icon48.png" alt="" class="hv-logo">
          <h1>HighlightVault</h1>
        </div>
        <label class="hv-toggle">
          <input type="checkbox" id="toggleEnabled" checked>
          <span class="hv-toggle-slider"></span>
        </label>
      </div>
      <div class="hv-counter" id="counter">0 highlights</div>
    </div>

    <!-- Search -->
    <div class="hv-search-wrap">
      <svg class="hv-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" class="hv-search" placeholder="Search highlights...">
    </div>

    <!-- Highlights List -->
    <div class="hv-list" id="highlightsList">
      <div class="hv-empty" id="emptyState">
        <p>No highlights yet.</p>
        <p class="hv-empty-sub">Select text on any page and pick a color to get started!</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="hv-footer">
      <button id="exportBtn" class="hv-export-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export as Markdown
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
